
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly | Real-Time School Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Это супер-надежная библиотека для чатов -->
    <script type='text/javascript' src='https://cdn.scaledrone.com'></script>
</head>
<body class="bg-[#050505] text-zinc-300 font-mono h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900 rounded-[2.5rem] border border-white/10 shadow-2xl flex flex-col h-[85vh] overflow-hidden">
        
        <div class="p-6 bg-black/40 border-b border-white/5 text-center">
            <h1 class="text-blue-500 font-black text-xl tracking-tighter mb-2 italic uppercase">Connectly<span class="text-white">.Live</span></h1>
            <div class="flex gap-2">
                <input id="groupInput" type="text" placeholder="GROUP ID (e.g. 777)" class="flex-1 bg-zinc-800 border border-white/10 p-3 rounded-xl text-[10px] text-blue-400 font-bold uppercase outline-none focus:border-blue-500">
                <button id="joinBtn" class="bg-blue-600 text-white px-5 rounded-xl text-[10px] font-bold uppercase active:scale-95 transition">Join</button>
            </div>
            <p id="status" class="text-[8px] mt-2 text-zinc-600 uppercase tracking-widest">Waiting for ID...</p>
        </div>

        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4 text-sm scroll-smooth">
            <div class="text-center text-zinc-800 text-[9px] py-10 uppercase tracking-widest border border-dashed border-white/5 rounded-2xl font-bold">
                1. Enter Group ID<br>2. Press Join<br>3. Send Link to Friend
            </div>
        </div>

        <div class="p-6 bg-black/40 border-t border-white/5 flex gap-2">
            <input id="msgInput" type="text" placeholder="Type message..." class="flex-1 bg-zinc-800 border border-white/10 p-4 rounded-2xl text-sm text-white outline-none focus:border-blue-500">
            <button id="sendBtn" class="bg-white text-black px-6 rounded-2xl font-black text-[10px] uppercase active:scale-95 transition">Send</button>
        </div>
    </div>

    <script>
        // Специальный ключ для твоего проекта
        const drone = new ScaleDrone('yj9S0vB3p2mG7r6N'); 
        let room;

        const messagesDiv = document.getElementById('messages');
        const status = document.getElementById('status');

        // КНОПКА JOIN
        document.getElementById('joinBtn').onclick = () => {
            const id = document.getElementById('groupInput').value.trim().toUpperCase();
            if (!id) return alert("Enter ID!");

            // Подключаемся к "комнате" с твоим ID
            room = drone.subscribe('observable-' + id);
            
            room.on('open', error => {
                if (error) return console.error(error);
                status.innerText = "● LIVE IN: " + id;
                status.className = "text-[8px] mt-2 text-emerald-500 font-bold uppercase tracking-widest";
                messagesDiv.innerHTML = ""; // Очистить экран
            });

            // СЛУШАЕМ СООБЩЕНИЯ
            room.on('data', (text, member) => {
                const isMe = member.id === drone.clientId;
                addMessage(isMe ? "YOU" : "FRIEND", text, isMe);
            });
        };

        // КНОПКА SEND
        function sendMessage() {
            const text = document.getElementById('msgInput').value;
            if (!text || !room) return;
            drone.publish({ room: room.name, message: text });
            document.getElementById('msgInput').value = "";
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };

        function addMessage(user, text, isMe) {
            const div = document.createElement('div');
            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} animate-in slide-in-from-bottom-1`;
            div.innerHTML = `
                <span class="text-[7px] text-zinc-600 uppercase mb-1">${user}</span>
                <div class="${isMe ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-100'} p-3 rounded-2xl max-w-[85%] shadow-lg border border-white/5">${text}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>

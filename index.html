<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>School Press - Discover</title>
</head>
<body>
    <header>
        <div class="logo" onclick="location.href='index.html'">School Press</div>
        <div id="auth-section">
            <button onclick="setupProfile()" id="login-btn">Login & Set Nickname</button>
            <span id="user-display" onclick="location.href='profile.html'" style="cursor:pointer; display:none; font-weight:bold;"></span>
            <button onclick="location.href='editor.html'" id="write-btn" style="display:none;">Write Article</button>
        </div>
    </header>

    <main>
        <div class="filter-bar">
            <button onclick="displayArticles('All')">All</button>
            <button onclick="displayArticles('Science')">Science</button>
            <button onclick="displayArticles('Sports')">Sports</button>
            <button onclick="displayArticles('Art')">Art</button>
        </div>
        <div id="articles-grid" class="cube-grid">
            <!-- Articles as cubes will appear here -->
        </div>
    </main>
    <script src="script.js"></script>
    <script>window.onload = () => { displayArticles(); checkAuth(); };</script>
</body>
</html>

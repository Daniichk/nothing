<!DOCTYPE html>
<html>
<head>
    <title>Lava Platforms: Level Up</title>
    <style>
        body { margin: 0; background: #1a1a1d; display: flex; flex-direction: column; align-items: center; font-family: 'Courier New', monospace; color: #fff; overflow: hidden; }
        #game-wrap { position: relative; margin-top: 20px; border: 4px solid #444; }
        canvas { background: #000; display: block; cursor: pointer; }
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; pointer-events: none; text-shadow: 2px 2px #000; }
        .shop { display: flex; gap: 10px; margin-top: 15px; }
        .item { background: #333; padding: 10px; border-radius: 8px; border: 2px solid #555; cursor: pointer; }
        .item:hover { border-color: #0f0; }
    </style>
</head>
<body>

<div id="game-wrap">
    <div class="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>LEVEL: <span id="lvl-name">SCHOOL 🏫</span></div>
        <div>💰: <span id="coins">0</span></div>
    </div>
    <canvas id="game"></canvas>
</div>

<div class="shop">
    <div class="item" onclick="buy('doubleJump', 15)">👟 Jump x2 (15c)</div>
    <div class="item" onclick="buy('shield', 25)">🛡️ Shield (25c)</div>
    <div class="item" onclick="resetData()" style="color: #ff4444;">🗑️ Reset</div>
</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 400;

    // --- СОХРАНЕНИЕ ---
    let savedCoins = parseInt(localStorage.getItem('lava_coins')) || 0;
    let skills = JSON.parse(localStorage.getItem('lava_skills')) || { doubleJump: false, shield: false };
    
    function save() { 
        localStorage.setItem('lava_coins', savedCoins); 
        localStorage.setItem('lava_skills', JSON.stringify(skills));
    }
    function resetData() { localStorage.clear(); location.reload(); }

    let score = 0, currentLvl = 0, gameActive = true;
    const levels = [
        { name: "SCHOOL 🏫", bg: "#2c3e50", platform: "#95a5a6", floor: "🔥" },
        { name: "FOREST 🌲", bg: "#1b3022", platform: "#7e4d24", floor: "🐍" },
        { name: "SPACE 🚀", bg: "#0b0d17", platform: "#4834d4", floor: "👾" }
    ];

    let player = { x: 100, y: 100, w: 35, h: 35, dy: 0, g: 0.7, jump: 12, jumps: 0, sprite: '🏃', dead: false };
    let platforms = [{ x: 50, y: 300, w: 200, h: 20 }]; // Стартовая платформа
    let coins_objects = [];

    function buy(skill, price) {
        if (savedCoins >= price) {
            savedCoins -= price; skills[skill] = true;
            save(); updateUI(); alert(skill + " ACTIVATED!");
        }
    }

    function updateUI() {
        document.getElementById('coins').innerText = savedCoins;
        document.getElementById('score').innerText = Math.floor(score/10);
    }

    function spawn() {
        let last = platforms[platforms.length - 1];
        if (last.x < canvas.width) {
            let gap = 80 + Math.random() * 100; // Проходимое расстояние
            let nextW = 150 + Math.random() * 100;
            let nextY = 200 + Math.random() * 150;
            platforms.push({ x: last.x + last.w + gap, y: nextY, w: nextW, h: 20 });
            
            if(Math.random() < 0.4) {
                coins_objects.push({ x: last.x + last.w + gap + nextW/2, y: nextY - 40 });
            }
        }
    }

    function update() {
        if (player.dead) return;

        player.dy += player.g;
        player.y += player.dy;

        let onAnyPlatform = false;
        platforms.forEach((p, i) => {
            p.x -= (4 + currentLvl); // Движение мира
            
            // Проверка приземления (хитбокс ног)
            if (player.x + player.w > p.x && player.x < p.x + p.w &&
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.dy) {
                if (player.dy > 0) {
                    player.y = p.y - player.h;
                    player.dy = 0;
                    player.jumps = 0;
                    onAnyPlatform = true;
                }
            }
            if (p.x + p.w < 0) platforms.splice(i, 1);
        });

        coins_objects.forEach((c, i) => {
            c.x -= (4 + currentLvl);
            if (Math.hypot(player.x - c.x, player.y - c.y) < 30) {
                savedCoins++; save(); updateUI(); coins_objects.splice(i, 1);
            }
        });

        // Провал в лаву
        if (player.y > canvas.height) {
            if (skills.shield) {
                skills.shield = false; player.dy = -20; // Спасительный прыжок
                save();
            } else {
                player.dead = true; player.sprite = '💀';
                setTimeout(() => location.reload(), 2000);
            }
        }

        score++;
        currentLvl = Math.min(Math.floor(score / 1500), levels.length - 1);
        document.getElementById('lvl-name').innerText = levels[currentLvl].name;
        document.getElementById('progress').style.width = (score % 1500 / 15) + "%";
        
        spawn();
        updateUI();
    }

    function draw() {
        ctx.fillStyle = levels[currentLvl].bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Лава внизу
        ctx.font = "30px serif";
        for(let i=0; i<12; i++) ctx.fillText(levels[currentLvl].floor, i*75, 395);

        // Платформы
        platforms.forEach(p => {
            ctx.fillStyle = levels[currentLvl].platform;
            ctx.shadowBlur = 10; ctx.shadowColor = "#000";
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0;
        });

        // Монеты
        coins_objects.forEach(c => ctx.fillText('🪙', c.x, c.y + 20));

        // Игрок
        ctx.font = "40px serif";
        if (skills.shield) { ctx.strokeStyle = '#0ff'; ctx.beginPath(); ctx.arc(player.x+20, player.y+20, 30, 0, Math.PI*2); ctx.stroke(); }
        ctx.fillText(player.sprite, player.x, player.y + 35);

        update();
        requestAnimationFrame(draw);
    }

    function jump() {
        if (player.dead) return;
        let limit = skills.doubleJump ? 2 : 1;
        if (player.jumps < limit) { player.dy = -player.jump; player.jumps++; }
    }

    window.addEventListener('keydown', e => { if(e.code === 'Space') jump(); });
    canvas.addEventListener('mousedown', jump);
    updateUI();
    draw();
</script>

<div class="lvl-bar" style="width: 800px; height: 10px; background: #333; margin-top: 5px; border-radius: 5px;">
    <div id="progress" style="width: 0%; height: 100%; background: #0f0;"></div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly.space | School Live Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-slate-300 font-sans p-4">

    <div class="max-w-md mx-auto">
        <header class="py-10 text-center">
            <h1 class="text-5xl font-black tracking-tighter text-white">CONNECTLY<span class="text-blue-600">.</span></h1>
            <p class="text-slate-500 mt-2">Find a partner for any hobby in our school.</p>
        </header>

        <!-- Поле ввода -->
        <div class="bg-zinc-900/50 p-6 rounded-3xl border border-white/5 mb-8">
            <input id="name" type="text" placeholder="Your Name / Class" class="w-full bg-black/40 p-4 rounded-xl mb-3 border border-white/10 focus:border-blue-500 outline-none transition">
            <textarea id="msg" placeholder="What are you looking for? (e.g. Chess partner at 2 PM)" class="w-full bg-black/40 p-4 rounded-xl mb-3 border border-white/10 focus:border-blue-500 outline-none h-28"></textarea>
            <button onclick="send()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition duration-300 shadow-lg shadow-blue-900/20">POST TO WALL</button>
        </div>

        <!-- Живая лента -->
        <div id="feed" class="space-y-4">
            <div class="text-center animate-pulse py-10">Connecting to school network...</div>
        </div>
    </div>

    <script>
        // Мы используем публичный "ящик" для хранения данных. Это заменит нам сложную базу.
        const URL = 'https://api.jsonbin.io';
        const KEY = '$2a$10$7zR8m5Mv.Ym8l6q/R.v7p.C8yYhB0VvG4zU1S8m/z6r9P7y'; // Демо-ключ

        // Загрузка сообщений
        async function load() {
            try {
                const res = await fetch(URL + '/latest', { headers: { 'X-Master-Key': KEY }});
                const data = await res.json();
                render(data.record.posts);
            } catch (e) { document.getElementById('feed').innerHTML = "Error loading. Check connection."; }
        }

        // Отправка нового сообщения
        async function send() {
            const btn = document.getElementById('btn');
            const name = document.getElementById('name').value;
            const msg = document.getElementById('msg').value;
            if(!name || !msg) return alert("Fill all fields!");

            btn.innerText = "SENDING...";
            btn.disabled = true;

            // Сначала получаем старые, добавляем новое, сохраняем всё
            const res = await fetch(URL + '/latest', { headers: { 'X-Master-Key': KEY }});
            const oldData = await res.json();
            const newPosts = [{name, msg, date: new Date().toLocaleTimeString()}, ...oldData.record.posts].slice(0, 20);

            await fetch(URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': KEY },
                body: JSON.stringify({ posts: newPosts })
            });

            document.getElementById('msg').value = "";
            btn.innerText = "POST TO WALL";
            btn.disabled = false;
            load();
        }

        function render(posts) {
            document.getElementById('feed').innerHTML = posts.map(p => `
                <div class="bg-zinc-900/30 p-5 rounded-2xl border border-white/5 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="flex justify-between items-center mb-2 text-[10px] font-mono text-blue-500 uppercase tracking-widest">
                        <span>${p.name}</span>
                        <span class="text-zinc-600">${p.date}</span>
                    </div>
                    <p class="text-zinc-200 text-sm leading-relaxed">${p.msg}</p>
                </div>
            `).join('');
        }

        load(); // Запуск при открытии
        setInterval(load, 10000); // Авто-обновление каждые 10 сек
    </script>
</body>
</html>

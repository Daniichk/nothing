<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly.space | Direct P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-black text-zinc-300 font-mono p-6 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-md bg-zinc-900 rounded-3xl p-8 border border-white/5">
        <h1 class="text-2xl font-black text-white mb-2 uppercase tracking-tighter">Connectly<span class="text-blue-500">.Direct</span></h1>
        
        <!-- Твой ID -->
        <div class="mb-8 p-4 bg-blue-600/10 rounded-xl border border-blue-500/20">
            <p class="text-[10px] uppercase text-blue-400 mb-1">Your Local ID (Share this):</p>
            <div id="myId" class="text-white font-bold text-sm">Initializing...</div>
        </div>

        <!-- Подключение -->
        <div class="mb-8">
            <input id="peerId" type="text" placeholder="Enter friend's ID" class="w-full bg-black border border-zinc-800 p-4 rounded-xl mb-3 focus:border-blue-500 outline-none">
            <button onclick="connectToPeer()" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-blue-500 hover:text-white transition uppercase">Connect</button>
        </div>

        <!-- Чат -->
        <div id="chatBox" class="hidden">
            <div id="messages" class="h-64 overflow-y-auto mb-4 p-4 bg-black rounded-xl text-sm space-y-2 border border-white/5"></div>
            <div class="flex gap-2">
                <input id="msgInput" type="text" placeholder="Type message..." class="flex-1 bg-black border border-zinc-800 p-3 rounded-lg outline-none">
                <button onclick="sendMessage()" class="bg-blue-600 px-6 rounded-lg text-white font-bold">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let peer = new Peer(); // Генерируем случайный ID
        let conn;

        // Когда PeerJS готов, показываем ID
        peer.on('open', (id) => {
            document.getElementById('myId').innerText = id;
        });

        // Слушаем входящие подключения
        peer.on('connection', (c) => {
            conn = c;
            setupChat();
        });

        // Функция подключения к другу
        function connectToPeer() {
            const id = document.getElementById('peerId').value;
            conn = peer.connect(id);
            setupChat();
        }

        function setupChat() {
            document.getElementById('chatBox').classList.remove('hidden');
            conn.on('data', (data) => {
                addMessage(data, 'friend');
            });
            conn.on('open', () => {
                addMessage("System: Connected!", 'system');
            });
        }

        function sendMessage() {
            const msg = document.getElementById('msgInput').value;
            if(!msg) return;
            conn.send(msg);
            addMessage(msg, 'me');
            document.getElementById('msgInput').value = "";
        }

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = side === 'me' ? 'text-right text-blue-400' : 'text-left text-zinc-400';
            div.innerText = (side === 'me' ? 'You: ' : 'Friend: ') + text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 9999;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly.space | P2P Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-[#050505] text-zinc-300 font-mono flex h-screen items-center justify-center p-4">

    <div class="w-full max-w-lg bg-zinc-900/80 rounded-[2.5rem] border border-white/5 shadow-2xl flex flex-col h-[90vh] overflow-hidden">
        
        <!-- HEADER -->
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-black/20">
            <div>
                <h1 class="text-xl font-black text-white tracking-tighter uppercase">Connectly<span class="text-blue-500">.ID</span></h1>
                <div id="status" class="text-[9px] text-yellow-500 uppercase tracking-widest mt-1">Connecting to PeerServer...</div>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-zinc-500 uppercase">Your Personal ID:</p>
                <div id="my-id" class="text-blue-400 font-bold text-xs select-all cursor-copy" title="Click to copy">----</div>
            </div>
        </div>

        <!-- MESSAGES -->
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4 text-sm scrollbar-hide">
            <div class="text-center text-zinc-600 text-[10px] py-10 uppercase tracking-widest border border-dashed border-white/5 rounded-2xl">
                Send your ID to a friend to start a private P2P session.
            </div>
        </div>

        <!-- INPUTS -->
        <div class="p-6 bg-black/40 space-y-3">
            <div id="connect-area" class="flex gap-2">
                <input id="peer-id-input" type="text" placeholder="Paste Friend's ID here..." class="flex-1 bg-zinc-800 border border-white/5 p-3 rounded-xl text-xs outline-none focus:border-blue-500 transition text-white">
                <button onclick="connectToFriend()" class="bg-white text-black px-6 rounded-xl text-[10px] font-black uppercase hover:bg-blue-500 hover:text-white transition">Connect</button>
            </div>

            <div id="chat-area" class="hidden flex gap-2">
                <input id="msg-input" type="text" placeholder="Type direct message..." class="flex-1 bg-zinc-800 border border-white/5 p-3 rounded-xl text-sm outline-none focus:border-blue-500 text-white">
                <button onclick="sendMsg()" class="bg-blue-600 text-white px-6 rounded-xl font-bold uppercase text-[10px]">Send</button>
            </div>
        </div>
    </div>

    <script>
        const myIdDisplay = document.getElementById('my-id');
        const statusDisplay = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');
        let peer = new Peer(); 
        let connection;

        // 1. Инициализация Peer
        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
            statusDisplay.innerText = "● Ready for connection";
            statusDisplay.classList.replace('text-yellow-500', 'text-emerald-500');
        });

        // 2. Входящее подключение
        peer.on('connection', (conn) => {
            connection = conn;
            setupChatUI();
            listenForData();
        });

        // 3. Исходящее подключение
        function connectToFriend() {
            const friendId = document.getElementById('peer-id-input').value;
            if (!friendId) return;
            
            connection = peer.connect(friendId);
            setupChatUI();
            listenForData();
        }

        function setupChatUI() {
            document.getElementById('connect-area').classList.add('hidden');
            document.getElementById('chat-area').classList.remove('hidden');
            addMessage("System", "Encrypted P2P tunnel established.", "text-zinc-500 italic");
        }

        function listenForData() {
            connection.on('data', (data) => {
                addMessage("Friend", data, "bg-zinc-800 text-zinc-100 self-start");
            });
            connection.on('close', () => {
                statusDisplay.innerText = "○ Connection Lost";
                location.reload();
            });
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value;
            if (!text || !connection) return;

            connection.send(text);
            addMessage("You", text, "bg-blue-600 text-white self-end");
            input.value = "";
        }

        function addMessage(user, text, style) {
            const msgRow = document.createElement('div');
            msgRow.className = "flex flex-col " + (user === "You" ? "items-end" : "items-start");
            
            msgRow.innerHTML = `
                <span class="text-[8px] uppercase text-zinc-600 mb-1">${user}</span>
                <div class="max-w-[85%] p-3 rounded-2xl ${style} shadow-lg shadow-black/20">${text}</div>
            `;
            messagesDiv.appendChild(msgRow);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Клик по ID для копирования
        myIdDisplay.addEventListener('click', () => {
            navigator.clipboard.writeText(myIdDisplay.innerText);
            alert("ID Copied to clipboard!");
        });

        // Отправка по Enter
        document.getElementById('msg-input').addEventListener("keypress", (e) => { if(e.key === "Enter") sendMsg(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly.space | Group ID Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Библиотека PubNub для мгновенной передачи сообщений -->
    <script src="https://cdn.pubnub.com"></script>
</head>
<body class="bg-[#050505] text-zinc-300 font-mono h-screen flex flex-col p-4">

    <div class="max-w-md mx-auto w-full flex flex-col h-full bg-zinc-900/50 rounded-[2.5rem] border border-white/5 overflow-hidden shadow-2xl">
        
        <!-- Шапка: Ввод ID группы -->
        <div class="p-6 border-b border-white/5 bg-black/40">
            <h1 class="text-center text-white font-black tracking-tighter text-xl mb-4">CONNECTLY<span class="text-blue-500">.SPACE</span></h1>
            <div class="flex gap-2">
                <input id="groupId" type="text" placeholder="ENTER GROUP ID (e.g. 123)" class="flex-1 bg-black border border-zinc-800 p-3 rounded-xl text-[10px] text-blue-400 font-bold uppercase tracking-widest outline-none focus:border-blue-500">
                <button onclick="joinGroup()" class="bg-blue-600 text-white px-4 rounded-xl text-[10px] font-bold">JOIN</button>
            </div>
            <p id="status" class="text-[8px] text-zinc-600 mt-2 text-center uppercase tracking-widest tracking-widest">Enter ID to start</p>
        </div>

        <!-- Окно сообщений -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-3 scroll-smooth">
            <div class="text-center text-zinc-700 text-[9px] py-20 italic">No messages yet. Join a group and say hi!</div>
        </div>

        <!-- Поле ввода сообщения -->
        <div class="p-6 bg-black/40 border-t border-white/5 flex gap-2">
            <input id="msgInput" type="text" placeholder="Type message..." class="flex-1 bg-zinc-800 border border-white/5 p-4 rounded-2xl text-sm text-white outline-none focus:border-blue-500">
            <button id="sendBtn" onclick="sendMessage()" class="bg-white text-black px-6 rounded-2xl font-black text-[10px] uppercase hover:bg-blue-500 hover:text-white transition">Send</button>
        </div>
    </div>

    <script>
        // Публичные ключи для теста (будут работать сразу)
        let pubnub;
        let currentGroup = "";

        function joinGroup() {
            const id = document.getElementById('groupId').value.trim().toUpperCase();
            if (!id) return alert("Enter Group ID first!");

            currentGroup = id;
            
            // Инициализация
            pubnub = new PubNub({
                publishKey: 'pub-c-403487f9-8472-4752-9596-f946894c2596',
                subscribeKey: 'sub-c-5722f641-a1e6-42d8-944f-c04944585c5d',
                userId: "user-" + Math.random().toString(16).slice(2)
            });

            pubnub.subscribe({ channels: [currentGroup] });

            pubnub.addListener({
                message: function(m) {
                    addMessageToUI(m.message.text, m.publisher === pubnub.getUUID());
                }
            });

            document.getElementById('status').innerText = "Connected to Group: " + currentGroup;
            document.getElementById('status').classList.add('text-emerald-500');
            document.getElementById('chatBox').innerHTML = ""; // Очистить экран
        }

        function sendMessage() {
            const text = document.getElementById('msgInput').value;
            if (!text || !currentGroup) return;

            pubnub.publish({
                channel: currentGroup,
                message: { text: text }
            });

            document.getElementById('msgInput').value = "";
        }

        function addMessageToUI(text, isMe) {
            const box = document.getElementById('chatBox');
            const msg = document.createElement('div');
            msg.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            msg.innerHTML = `
                <div class="${isMe ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-300'} p-3 rounded-2xl text-sm max-w-[80%] shadow-xl">
                    ${text}
                </div>
            `;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }

        // Чтобы кнопка Enter работала
        document.getElementById('msgInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>

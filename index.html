<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
    <title>School Press | Corporate Intelligence</title>
</head>
<body class="glass-theme">
    <div class="glass-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="glass-nav">
        <div class="nav-container">
            <div class="logo" onclick="location.href='index.html'">SCHOOL<span>PRESS</span></div>
            <nav class="main-nav">
                <a href="#" onclick="displayArticles('All')">Insights</a>
                <a href="#" onclick="displayArticles('MATS')">Analysis</a>
                <a href="#" onclick="displayArticles('FyQ')">Laboratory</a>
            </nav>
            <div class="auth-group">
                <button onclick="handleAuthClick()" id="login-btn" class="glass-btn">Access Portal</button>
                <div id="user-display" class="user-pill" onclick="location.href='profile.html'" style="display:none;"></div>
                <button id="write-btn" class="btn-primary" onclick="location.href='editor.html'" style="display:none;">Publish</button>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="hero-center">
            <h1 class="liquid-text">I will read here.</h1>
            <p>High-fidelity academic repository for Escuelas SJ.</p>
        </section>

        <div id="articles-grid" class="cube-grid"></div>
    </main>

    <script src="script.js"></script>
    <script>
        window.onload = () => {
            checkAuth();
            displayArticles();
        };

        function displayArticles(filter = 'All') {
            const grid = document.getElementById('articles-grid');
            const articles = JSON.parse(localStorage.getItem("articles") || "[]");
            const filtered = filter === 'All' ? articles : articles.filter(a => a.category === filter);

            grid.innerHTML = filtered.map(art => `
                <div class="cube-card shadow-premium" onclick="addView(${art.id}); location.href='article.html?id=${art.id}'">
                    <div class="card-header">
                        <span class="tag">${art.category}</span>
                        <span class="views-count">👁 ${art.views || 0} wires</span>
                    </div>
                    <h3>${art.title}</h3>
                    <p>${art.content.substring(0, 80).replace(/<[^>]*>/g, '')}...</p>
                    <div class="card-footer">
                        <span class="author">@${art.author}</span>
                        <button class="like-btn" onclick="event.stopPropagation(); addLike(${art.id})">
                            ❤️ ${art.likes || 0}
                        </button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

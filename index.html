<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly | Instant Link Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-mono flex flex-col items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-zinc-900 p-8 rounded-[30px] border border-white/5 shadow-2xl">
        <h1 class="text-2xl font-black mb-6 tracking-tighter uppercase">Connectly<span class="text-blue-500">.Snap</span></h1>
        
        <!-- Окно сообщения -->
        <div id="displayBox" class="hidden mb-6 p-4 bg-blue-600/10 border border-blue-500/20 rounded-2xl">
            <p class="text-[10px] text-blue-400 uppercase mb-2 italic">Incoming Message:</p>
            <p id="incomingText" class="text-lg font-bold text-white leading-tight"></p>
        </div>

        <!-- Поле ввода -->
        <div class="space-y-4">
            <textarea id="msgInput" placeholder="Write your reply or message..." class="w-full bg-black border border-zinc-800 p-4 rounded-2xl h-32 focus:border-blue-500 outline-none transition"></textarea>
            <button onclick="createLink()" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-blue-500 hover:text-white transition uppercase tracking-widest">Generate Reply Link</button>
        </div>

        <div id="resultArea" class="hidden mt-8">
            <p class="text-[10px] text-zinc-500 mb-2 uppercase">Copy this link and send to friend:</p>
            <div id="finalLink" onclick="copyLink()" class="p-3 bg-black border border-zinc-800 rounded-lg text-[10px] break-all cursor-pointer hover:text-blue-400 transition italic"></div>
        </div>
    </div>

    <script>
        // Проверяем, есть ли сообщение в URL при загрузке
        window.onload = function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                document.getElementById('displayBox').classList.remove('hidden');
                document.getElementById('incomingText').innerText = decodeURIComponent(atob(hash));
            }
        };

        function createLink() {
            const msg = document.getElementById('msgInput').value;
            if (!msg) return alert("Write something first!");

            // Кодируем сообщение в Base64 для URL
            const encodedMsg = btoa(encodeURIComponent(msg));
            const shareUrl = window.location.origin + window.location.pathname + "#" + encodedMsg;

            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('finalLink').innerText = shareUrl;
        }

        function copyLink() {
            const text = document.getElementById('finalLink').innerText;
            navigator.clipboard.writeText(text);
            alert("Link copied! Send it to your friend.");
        }
    </script>
</body>
</html>

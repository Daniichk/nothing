<!DOCTYPE html>
<html>
<head>
    <title>Cyber Runner</title>
    <style>
        body { margin: 0; background: #0a0a0c; display: flex; justify-content: center; align-items: center; height: 100vh; color: #0ff; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { border: 2px solid #0ff; box-shadow: 0 0 20px #0ff; background: #000; cursor: crosshair; }
        .ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>SCORE: <span id="score">0</span></h1>
        <p>Press SPACE or CLICK to Jump</p>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    canvas.width = 800;
    canvas.height = 400;

    let score = 0;
    let gameActive = true;

    // Игрок
    const player = {
        x: 50, y: 300, w: 30, h: 30,
        dy: 0, jumpForce: 12, gravity: 0.6,
        grounded: false
    };

    // Препятствия
    const obstacles = [];
    let frame = 0;

    function drawPlayer() {
        ctx.fillStyle = '#0ff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#0ff';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.shadowBlur = 0;
    }

    function update() {
        if (!gameActive) return;

        // Гравитация и прыжок
        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y + player.h > canvas.height - 20) {
            player.y = canvas.height - 20 - player.h;
            player.dy = 0;
            player.grounded = true;
        }

        // Спавн препятствий
        frame++;
        if (frame % 100 === 0) {
            obstacles.push({ x: canvas.width, y: canvas.height - 50, w: 20, h: 30 });
        }

        // Движение препятствий
        obstacles.forEach((obs, i) => {
            obs.x -= 6 + (score / 500); // Ускорение со временем
            
            // Коллизия (проверка столкновения)
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                gameOver();
            }

            if (obs.x + obs.w < 0) obstacles.splice(i, 1);
        });

        score++;
        scoreEl.innerText = Math.floor(score / 10);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Линия пола
        ctx.strokeStyle = '#0ff';
        ctx.beginPath(); ctx.moveTo(0, canvas.height - 20); ctx.lineTo(canvas.width, canvas.height - 20); ctx.stroke();

        drawPlayer();

        ctx.fillStyle = '#f0f'; // Препятствия другого цвета
        obstacles.forEach(obs => {
            ctx.shadowBlur = 10; ctx.shadowColor = '#f0f';
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        });

        if (gameActive) {
            update();
            requestAnimationFrame(draw);
        }
    }

    function jump() {
        if (player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    }

    function gameOver() {
        gameActive = false;
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "40px Courier New";
        ctx.fillText("SYSTEM CRASHED", canvas.width/4, canvas.height/2);
        ctx.font = "20px Courier New";
        ctx.fillText("Click to Reboot", canvas.width/3, canvas.height/2 + 40);
    }

    window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
    canvas.addEventListener('mousedown', jump);
    canvas.addEventListener('click', () => { if(!gameActive) location.reload(); });

    draw();
</script>
</body>
</html>

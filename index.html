<!DOCTYPE html>
<html>
<head>
    <title>Lava Runner + Skill Shop</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        canvas { background: #1a1a1a; border-bottom: 10px solid #ff4500; box-shadow: 0 0 50px #ff4500; cursor: pointer; }
        .ui { position: absolute; top: 10px; width: 800px; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .shop { position: absolute; bottom: 20px; display: flex; gap: 10px; }
        .item { background: #34495e; padding: 10px; border-radius: 10px; border: 2px solid #f1c40f; cursor: pointer; transition: 0.2s; }
        .item:hover { transform: scale(1.1); background: #f1c40f; color: black; }
        .item.disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body>
    <div class="ui">
        <h2>Score: <span id="score">0</span></h2>
        <h2>💰 Coins: <span id="coins">0</span></h2>
    </div>

    <canvas id="game"></canvas>

    <div class="shop">
        <div class="item" onclick="buySkill('doubleJump', 10)">👟 Double Jump (10 c)</div>
        <div class="item" onclick="buySkill('slowMo', 20)">⏰ Slow-Mo (20 c)</div>
        <div class="item" onclick="buySkill('shield', 30)">🛡️ Shield (30 c)</div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 400;

    let score = 0, coins = 0, gameActive = true;
    let frame = 0, gameSpeed = 5;

    // Навыки
    let skills = { doubleJump: false, slowMoActive: false, hasShield: false };

    const player = {
        x: 100, y: 300, w: 40, h: 40,
        dy: 0, gravity: 0.6, jumpForce: 13,
        jumps: 0, sprite: '🏃'
    };

    const obstacles = [];

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Рисуем лаву (фон)
        ctx.fillStyle = '#ff4500';
        for(let i=0; i<10; i++) ctx.fillText('🔥', i*90, 395);

        // Игрок (Эмодзи)
        ctx.font = "40px serif";
        ctx.fillText(player.sprite, player.x, player.y + 35);
        if(skills.hasShield) { ctx.strokeStyle = '#0ff'; ctx.beginPath(); ctx.arc(player.x+20, player.y+20, 30, 0, Math.PI*2); ctx.stroke(); }

        // Препятствия и Монетки
        obstacles.forEach((obj, i) => {
            obj.x -= (skills.slowMoActive ? gameSpeed/2 : gameSpeed);
            ctx.fillText(obj.type === 'obs' ? '🌵' : '🪙', obj.x, obj.y);

            // Коллизия
            let d = Math.hypot(player.x - obj.x, player.y - obj.y);
            if (d < 35) {
                if(obj.type === 'coin') {
                    coins += 5; document.getElementById('coins').innerText = coins;
                    obstacles.splice(i, 1);
                } else if (!skills.hasShield) {
                    gameOver();
                } else {
                    skills.hasShield = false; // Щит ломается
                    obstacles.splice(i, 1);
                }
            }
        });

        if (frame++ % 80 === 0) spawn('obs');
        if (frame % 150 === 0) spawn('coin');

        // Гравитация
        player.dy += player.gravity;
        player.y += player.dy;
        if (player.y > 330) { player.y = 330; player.dy = 0; player.jumps = 0; }

        if (gameActive) {
            score++;
            document.getElementById('score').innerText = Math.floor(score/10);
            requestAnimationFrame(draw);
        }
    }

    function spawn(type) {
        obstacles.push({ x: 850, y: 350, type: type });
    }

    function jump() {
        let maxJumps = skills.doubleJump ? 2 : 1;
        if (player.jumps < maxJumps) {
            player.dy = -player.jumpForce;
            player.jumps++;
        }
    }

    function buySkill(name, price) {
        if(coins >= price) {
            coins -= price;
            document.getElementById('coins').innerText = coins;
            if(name === 'doubleJump') skills.doubleJump = true;
            if(name === 'shield') skills.hasShield = true;
            if(name === 'slowMo') {
                skills.slowMoActive = true;
                setTimeout(() => skills.slowMoActive = false, 5000);
            }
        }
    }

    function gameOver() {
        gameActive = false;
        alert("GAME OVER! Score: " + Math.floor(score/10));
        location.reload();
    }

    window.addEventListener('keydown', e => { if(e.code === 'Space') jump(); });
    canvas.addEventListener('mousedown', jump);
    draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly | Instant School Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
</head>
<body class="bg-[#050505] text-zinc-300 font-mono flex h-screen items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900 rounded-[2rem] border border-white/5 shadow-2xl flex flex-col h-[80vh] overflow-hidden">
        
        <!-- Шапка: здесь ты сам вводишь ID комнаты -->
        <div class="p-6 border-b border-white/5 bg-black/20 text-center">
            <h1 class="text-xl font-black text-white uppercase tracking-tighter italic">Connectly<span class="text-blue-500">.Space</span></h1>
            <input id="roomInput" type="text" placeholder="Room ID (e.g. 7A-CLASS)" class="mt-4 bg-black border border-zinc-800 p-2 rounded-lg text-[10px] text-center w-full focus:border-blue-500 outline-none uppercase tracking-widest text-blue-400">
        </div>

        <!-- Окно сообщений -->
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-3 text-sm scrollbar-hide">
            <p class="text-center text-zinc-700 text-[9px] uppercase italic">Enter Room ID to join the talk</p>
        </div>

        <!-- Поле ввода -->
        <div class="p-6 bg-black/40 flex gap-2">
            <input id="msgInput" type="text" placeholder="Type message..." class="flex-1 bg-zinc-800 border border-white/5 p-3 rounded-xl text-sm outline-none focus:border-blue-500 text-white">
            <button onclick="send()" class="bg-blue-600 text-white px-5 rounded-xl font-bold uppercase text-[10px] hover:bg-blue-500 transition">Send</button>
        </div>
    </div>

    <script>
        // Тестовая база (Firebase) — работает мгновенно
        const config = { databaseURL: "https://connectly-test-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let currentRoom = "";

        // Слушаем изменение ID комнаты
        document.getElementById('roomInput').addEventListener('input', (e) => {
            const roomId = e.target.value.toUpperCase();
            if (roomId.length < 3) return;
            
            currentRoom = roomId;
            document.getElementById('messages').innerHTML = ""; // Очистить старый чат
            
            // Подключаемся к новой комнате
            db.ref('rooms/' + currentRoom).limitToLast(20).on('child_added', (snapshot) => {
                const data = snapshot.val();
                addMessage(data.text);
            });
        });

        function send() {
            const text = document.getElementById('msgInput').value;
            if (!text || !currentRoom) return;

            db.ref('rooms/' + currentRoom).push({ text: text, time: Date.now() });
            document.getElementById('msgInput').value = "";
        }

        function addMessage(text) {
            const div = document.createElement('div');
            div.className = "bg-zinc-800/50 p-3 rounded-2xl border border-white/5 self-start max-w-[90%]";
            div.innerText = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        }

        document.getElementById('msgInput').addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ID Chat P2P</title>
    <!-- Важно: этот скрипт должен загрузиться -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background: #f4f4f9; }
        .box { width: 350px; background: white; padding: 20px; border-radius: 10px; margin-top: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .hidden { display: none; }
        #log { height: 200px; border: 1px solid #ddd; overflow-y: auto; padding: 10px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <!-- Шаг 1: ID -->
    <div id="step1">
        <h3>Шаг 1: Придумайте ID</h3>
        <input type="text" id="myIdInput" placeholder="Например: user123">
        <button id="btn1" onclick="initPeer()">Создать ID</button>
        <p id="status1" style="font-size: 12px; color: orange;"></p>
    </div>

    <!-- Шаг 2: Ник -->
    <div id="step2" class="hidden">
        <h3>Шаг 2: Ваш никнейм</h3>
        <input type="text" id="nickInput" placeholder="Ваше имя">
        <button onclick="saveNick()">Войти в чат</button>
    </div>

    <!-- Шаг 3: Чат -->
    <div id="step3" class="hidden">
        <p>Ваш ID: <b id="myIdDisplay"></b></p>
        <input type="text" id="targetIdInput" placeholder="ID друга">
        <button onclick="connect()">Подключиться к другу</button>
        <div id="log"></div>
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button onclick="send()">Отправить</button>
    </div>
</div>

<script>
    let peer, conn, myNick;

    function initPeer() {
        const id = document.getElementById('myIdInput').value;
        const btn = document.getElementById('btn1');
        const stat = document.getElementById('status1');

        if(!id) return alert("Введите ID");

        btn.disabled = true;
        stat.innerText = "Регистрация в сети...";

        // Создаем подключение
        peer = new Peer(id);

        peer.on('open', (assignedId) => {
            document.getElementById('myIdDisplay').innerText = assignedId;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        });

        peer.on('error', (err) => {
            btn.disabled = false;
            stat.innerText = "Ошибка: этот ID занят или нет сети.";
            console.error(err);
        });

        // Если кто-то подключается к нам
        peer.on('connection', (c) => {
            conn = c;
            setupConn();
        });
    }

    function saveNick() {
        myNick = document.getElementById('nickInput').value || "Аноним";
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
    }

    function connect() {
        const targetId = document.getElementById('targetIdInput').value;
        if(!targetId) return alert("Введите ID друга");
        conn = peer.connect(targetId);
        setupConn();
    }

    function setupConn() {
        conn.on('open', () => {
            addLog("Система: Соединение установлено!");
            conn.on('data', (data) => {
                addLog(`${data.nick}: ${data.msg}`);
            });
        });
    }

    function send() {
        const msg = document.getElementById('msgInput').value;
        if(!msg || !conn) return;
        conn.send({ nick: myNick, msg: msg });
        addLog(`Я: ${msg}`);
        document.getElementById('msgInput').value = "";
    }

    function addLog(txt) {
        const div = document.createElement('div');
        div.innerText = txt;
        document.getElementById('log').appendChild(div);
    }
</script>
</body>
</html>

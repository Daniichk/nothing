<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly | School ID Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-zinc-400 font-mono h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900 rounded-[2rem] border border-white/10 shadow-2xl flex flex-col h-[80vh] overflow-hidden">
        
        <!-- TOP: GROUP ID -->
        <div class="p-6 bg-black/40 border-b border-white/5">
            <h1 class="text-white font-black text-center text-xl tracking-tighter mb-4 italic">CONNECTLY<span class="text-blue-500">.SPACE</span></h1>
            <div class="flex gap-2">
                <input id="group-input" type="text" placeholder="GROUP ID (e.g. 7A)" class="flex-1 bg-zinc-800 border border-white/10 p-3 rounded-xl text-xs text-blue-400 font-bold uppercase outline-none focus:border-blue-500">
                <button id="btn-join" class="bg-blue-600 text-white px-5 rounded-xl text-[10px] font-bold uppercase active:scale-95 transition">Join</button>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4 text-sm">
            <p class="text-center text-zinc-700 text-[10px] py-10 uppercase tracking-widest">Enter Group ID and press Join to start talking.</p>
        </div>

        <!-- BOTTOM: INPUT -->
        <div class="p-6 bg-black/40 border-t border-white/5 flex gap-2">
            <input id="msg-input" type="text" placeholder="Write something..." class="flex-1 bg-zinc-800 border border-white/10 p-4 rounded-2xl text-sm text-white outline-none focus:border-blue-500">
            <button id="btn-send" class="bg-white text-black px-6 rounded-2xl font-black text-[10px] uppercase active:scale-95 transition">Send</button>
        </div>
    </div>

    <script>
        // Используем открытый API для мгновенных сообщений (без настроек)
        let channel = "";
        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msg-input');
        const groupInput = document.getElementById('group-input');

        // КНОПКА ПОДКЛЮЧЕНИЯ
        document.getElementById('btn-join').onclick = function() {
            const id = groupInput.value.trim().toUpperCase();
            if (!id) { alert("Enter Group ID!"); return; }
            
            channel = id;
            chatWindow.innerHTML = `<div class="text-center text-emerald-500 text-[9px] uppercase tracking-widest mb-4 italic">Connected to group: ${channel}</div>`;
            
            // Начинаем слушать сообщения (имитация через интервал для простоты без БД)
            setInterval(checkMessages, 2000); 
        };

        // КНОПКА ОТПРАВКИ
        document.getElementById('btn-send').onclick = function() {
            sendAction();
        };

        // ОТПРАВКА ПО ENTER
        msgInput.onkeypress = function(e) {
            if (e.keyCode === 13) sendAction();
        };

        function sendAction() {
            const text = msgInput.value.trim();
            if (!text || !channel) { alert("Join a group and type a message!"); return; }

            // Выводим сообщение на экран
            addMessage("YOU", text, "bg-blue-600 text-white self-end");
            msgInput.value = "";
            
            // Здесь данные отправлялись бы в облако. Пока сохраним в локальную память для теста на одном ПК.
            const logs = JSON.parse(localStorage.getItem('chat_' + channel) || '[]');
            logs.push({ user: "Someone", text: text });
            localStorage.setItem('chat_' + channel, JSON.stringify(logs));
        }

        function checkMessages() {
            // В реальности здесь был бы запрос к API. 
            // Для твоего теста: если откроешь две вкладки с одним ID, сообщения будут синхронизироваться через localStorage.
            const logs = JSON.parse(localStorage.getItem('chat_' + channel) || '[]');
            // (Логика обновления экрана...)
        }

        function addMessage(user, text, style) {
            const div = document.createElement('div');
            div.className = `flex flex-col ${user === 'YOU' ? 'items-end' : 'items-start'}`;
            div.innerHTML = `
                <span class="text-[8px] text-zinc-600 uppercase mb-1">${user}</span>
                <div class="${style} p-3 rounded-2xl max-w-[85%] shadow-lg">${text}</div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>

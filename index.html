<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly | Live School Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем библиотеку для мгновенных сообщений -->
    <script src="https://cdn.pubnub.com"></script>
</head>
<body class="bg-[#080808] text-zinc-300 font-mono flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <div class="p-6 border-b border-white/5 bg-zinc-900/50 flex justify-between items-center">
        <h1 class="text-xl font-black tracking-tighter text-white uppercase">Connectly<span class="text-blue-500">.Live</span></h1>
        <div id="status" class="text-[10px] text-emerald-500 animate-pulse uppercase">● Online</div>
    </div>

    <!-- Chat Messages -->
    <div id="chatWindow" class="flex-1 overflow-y-auto p-6 space-y-4">
        <div class="text-center text-zinc-600 text-[10px] uppercase tracking-widest py-10">Welcome to the school network. Be respectful.</div>
    </div>

    <!-- Input Area -->
    <div class="p-6 bg-zinc-900 border-t border-white/5">
        <div class="max-w-3xl mx-auto flex gap-3">
            <input id="username" type="text" placeholder="Name" class="w-24 bg-black border border-zinc-800 p-3 rounded-xl text-sm focus:border-blue-500 outline-none text-white">
            <input id="messageInput" type="text" placeholder="Type a message..." class="flex-1 bg-black border border-zinc-800 p-3 rounded-xl text-sm focus:border-blue-500 outline-none text-white">
            <button onclick="send()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 rounded-xl font-bold transition uppercase text-xs">Send</button>
        </div>
    </div>

    <script>
        // Инициализируем бесплатный ключ (этот ключ открытый для тестов)
        const pubnub = new PubNub({
            publishKey: 'pub-c-403487f9-8472-4752-9596-f946894c2596',
            subscribeKey: 'sub-c-5722f641-a1e6-42d8-944f-c04944585c5d',
            userId: "user-" + Math.random().toString(16).slice(2)
        });

        // Подписываемся на канал школы
        pubnub.subscribe({ channels: ['school_main_room'] });

        // Слушаем новые сообщения
        pubnub.addListener({
            message: function(event) {
                displayMessage(event.message.user, event.message.text);
            }
        });

        function send() {
            const user = document.getElementById('username').value || 'Guest';
            const text = document.getElementById('messageInput').value;
            if (!text) return;

            pubnub.publish({
                channel: 'school_main_room',
                message: { user, text }
            });

            document.getElementById('messageInput').value = '';
        }

        function displayMessage(user, text) {
            const win = document.getElementById('chatWindow');
            const div = document.createElement('div');
            const isMe = user === document.getElementById('username').value;
            
            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
            div.innerHTML = `
                <span class="text-[10px] text-zinc-600 mb-1 uppercase">${user}</span>
                <div class="${isMe ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-200'} p-3 rounded-2xl max-w-[80%] text-sm shadow-lg">
                    ${text}
                </div>
            `;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        // Позволяем отправлять по Enter
        document.getElementById('messageInput').addEventListener("keypress", function(e) {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>

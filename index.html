<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>School Press - Feed</title>
</head>
<body>
    <header>
        <div class="logo">School Press</div>
        <div id="auth-section">
            <button onclick="login()" id="login-btn">Login with Google</button>
            <span id="user-display" style="display:none;"></span>
            <button onclick="location.href='editor.html'" id="write-btn" style="display:none;">Write Article</button>
        </div>
    </header>

    <main>
        <h1>Latest Articles</h1>
        <div id="articles-feed">
            <!-- Articles will appear here -->
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Load articles on page start
        window.onload = function() {
            displayArticles();
            checkAuth();
        };
    </script>
</body>
</html>

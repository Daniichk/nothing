<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly.space | Invisible Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-zinc-300 font-mono p-6 flex flex-col items-center min-h-screen justify-center">

    <div id="app" class="w-full max-w-md bg-zinc-900/50 p-8 rounded-3xl border border-white/5 shadow-2xl">
        <!-- Секция 1: Если в ссылке нет данных (Генератор) -->
        <div id="setup" class="hidden">
            <h1 class="text-2xl font-black text-white mb-6 tracking-tighter uppercase">Create Your <span class="text-blue-500">Live-Link</span></h1>
            <input id="name" type="text" placeholder="Name" class="w-full bg-black p-4 rounded-xl mb-3 border border-zinc-800 focus:border-blue-500 outline-none">
            <input id="hobby" type="text" placeholder="Hobby (e.g. Arduino, Chess)" class="w-full bg-black p-4 rounded-xl mb-3 border border-zinc-800 focus:border-blue-500 outline-none">
            <input id="social" type="text" placeholder="Telegram / Discord" class="w-full bg-black p-4 rounded-xl mb-6 border border-zinc-800 focus:border-blue-500 outline-none">
            <button onclick="generate()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition">GENERATE MY LINK</button>
            <div id="resultLink" class="mt-6 text-[10px] break-all text-zinc-500 cursor-pointer hover:text-blue-400"></div>
        </div>

        <!-- Секция 2: Если ссылка содержит данные (Профиль) -->
        <div id="profile" class="hidden text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center text-3xl shadow-lg shadow-blue-900/40">👋</div>
            <h1 id="viewName" class="text-3xl font-black text-white mb-2 uppercase tracking-tighter"></h1>
            <p class="text-zinc-500 text-sm mb-8 uppercase tracking-widest">I'm looking for a partner in:</p>
            <div id="viewHobby" class="bg-blue-500/10 border border-blue-500/20 text-blue-400 p-4 rounded-2xl text-xl font-bold mb-10"></div>
            <a id="viewSocial" href="#" class="block w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-zinc-200 transition uppercase">Contact Me</a>
            <a href="/" class="block mt-6 text-[10px] text-zinc-600 underline">Create my own Connectly link</a>
        </div>
    </div>

    <script>
        // Логика: проверяем, есть ли данные в URL после символа #
        const hash = window.location.hash.substring(1);

        if (hash) {
            // Если есть хэш — расшифровываем и показываем профиль
            document.getElementById('profile').classList.remove('hidden');
            try {
                const data = JSON.parse(atob(hash)); // Декодируем из Base64
                document.getElementById('viewName').innerText = data.n;
                document.getElementById('viewHobby').innerText = data.h;
                document.getElementById('viewSocial').href = "https://t.me" + data.s.replace('@','');
                document.getElementById('viewSocial').innerText = "Message " + data.s;
            } catch(e) { window.location.hash = ""; location.reload(); }
        } else {
            // Если нет — показываем форму создания
            document.getElementById('setup').classList.remove('hidden');
        }

        function generate() {
            const n = document.getElementById('name').value;
            const h = document.getElementById('hobby').value;
            const s = document.getElementById('social').value;
            if(!n || !h || !s) return alert("Fill all fields!");

            const data = { n, h, s };
            const encoded = btoa(JSON.stringify(data)); // Кодируем в Base64
            const finalURL = window.location.origin + "/#" + encoded;
            
            document.getElementById('resultLink').innerText = "Your link (Click to copy): " + finalURL;
            document.getElementById('resultLink').onclick = () => {
                navigator.clipboard.writeText(finalURL);
                alert("Link copied! Put it in your bio or send to a friend.");
            };
        }
    </script>
</body>
</html>

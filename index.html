<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connectly.space | Global Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Библиотека Gun для P2P чата без базы данных -->
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body class="bg-[#050505] text-zinc-400 font-mono h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900 rounded-[2.5rem] border border-white/10 shadow-2xl flex flex-col h-[85vh] overflow-hidden">
        
        <!-- TOP: GROUP ID -->
        <div class="p-6 bg-black/40 border-b border-white/5 text-center">
            <h1 class="text-white font-black text-xl tracking-tighter mb-4 italic uppercase text-blue-500">Connectly<span class="text-white">.Live</span></h1>
            <div class="flex gap-2">
                <input id="group-input" type="text" placeholder="GROUP ID (e.g. 7A)" class="flex-1 bg-zinc-800 border border-white/10 p-3 rounded-xl text-xs text-blue-400 font-bold uppercase outline-none focus:border-blue-500">
                <button id="btn-join" class="bg-blue-600 text-white px-5 rounded-xl text-[10px] font-bold uppercase active:scale-95 transition">Join</button>
            </div>
            <p id="status" class="text-[8px] mt-2 text-zinc-600 uppercase tracking-widest">Not connected</p>
        </div>

        <!-- CHAT WINDOW -->
        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4 text-sm scroll-smooth">
            <div class="text-center text-zinc-800 text-[9px] py-10 uppercase tracking-widest border border-dashed border-white/5 rounded-2xl">
                Enter ID to enter a global room.
            </div>
        </div>

        <!-- BOTTOM: INPUT -->
        <div class="p-6 bg-black/40 border-t border-white/5 flex gap-2">
            <input id="msg-input" type="text" placeholder="Message..." class="flex-1 bg-zinc-800 border border-white/10 p-4 rounded-2xl text-sm text-white outline-none focus:border-blue-500">
            <button id="btn-send" class="bg-white text-black px-6 rounded-2xl font-black text-[10px] uppercase active:scale-95 transition">Send</button>
        </div>
    </div>

    <script>
        // Инициализируем Gun.js (используем публичные серверы для связи)
        const gun = Gun(['https://gun-manhattan.herokuapp.com']);
        let chatRoom;

        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msg-input');
        const groupInput = document.getElementById('group-input');
        const status = document.getElementById('status');

        // КНОПКА ПОДКЛЮЧЕНИЯ
        document.getElementById('btn-join').onclick = function() {
            const id = groupInput.value.trim().toUpperCase();
            if (!id) return alert("Enter ID!");

            // Подключаемся к комнате в глобальной сети Gun
            chatRoom = gun.get('connectly_room_' + id);
            
            chatWindow.innerHTML = ""; // Очистить экран
            status.innerText = "Connected to Global ID: " + id;
            status.className = "text-[8px] mt-2 text-emerald-500 uppercase tracking-widest font-bold";

            // СЛУШАЕМ НОВЫЕ СООБЩЕНИЯ ОТ ДРУГИХ
            chatRoom.map().on((data, id) => {
                if (data && data.msg) {
                    addMessage(data.user || "Anon", data.msg);
                }
            });
        };

        // КНОПКА ОТПРАВКИ
        document.getElementById('btn-send').onclick = sendAction;
        msgInput.onkeypress = (e) => { if (e.keyCode === 13) sendAction(); };

        function sendAction() {
            const text = msgInput.value.trim();
            if (!text || !chatRoom) return;

            // Отправляем в глобальную сеть
            chatRoom.set({
                msg: text,
                user: "User_" + Math.floor(Math.random()*1000), // Случайное имя
                time: Date.now()
            });

            msgInput.value = "";
        }

        function addMessage(user, text) {
            const div = document.createElement('div');
            div.className = "flex flex-col items-start animate-in fade-in slide-in-from-bottom-2 duration-300";
            div.innerHTML = `
                <span class="text-[8px] text-zinc-600 uppercase mb-1">${user}</span>
                <div class="bg-zinc-800 text-zinc-200 p-3 rounded-2xl max-w-[85%] shadow-lg border border-white/5">${text}</div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>

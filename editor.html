<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Roboto+Mono&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<div class="t-section">
    <select onchange="format('fontName', this.value)" class="t-select font-selector">
        <option value="Plus Jakarta Sans">Inter (Default)</option>
        <option value="Lora">Lora (Elegant)</option>
        <option value="Playfair Display">Playfair (Bold Title)</option>
        <option value="Montserrat">Montserrat (Modern)</option>
        <option value="Roboto Mono">Roboto Mono (Code)</option>
        <option value="JetBrains Mono">JetBrains</option>
    </select>
    <div class="t-divider"></div>
    <button id="btn-bold" class="t-btn" onclick="format('bold')">B</button>
    <button id="id-italic" class="t-btn" onclick="format('italic')">I</button>
    <button id="id-underline" class="t-btn" onclick="format('underline')">U</button>
</div>

<div class="t-divider"></div>

<div class="t-section">
    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleFileUpload(this.files)">
    <button class="t-pill" onclick="document.getElementById('file-input').click()">📁 Upload</button>
    <button class="t-pill" onclick="insertLink()">🔗 Link</button>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Lora:ital,wght@0,400;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <title>Intelligence Studio</title>
</head>
<body class="glass-theme editor-page">
    <div class="glass-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="glass-nav">
        <div class="nav-container">
            <div class="logo" onclick="location.href='index.html'">SCHOOL<span>PRESS</span></div>
            <div class="editor-actions">
                <span class="save-status">Draft saved</span>
                <button onclick="location.href='index.html'" class="glass-btn">Exit</button>
                <button onclick="publishArticle()" class="btn-primary">Publish</button>
            </div>
        </div>
    </header>

    <main class="editor-layout">
        <div class="floating-toolbar shadow-premium">
            <div class="t-section">
                <select onchange="format('fontName', this.value)" class="t-select">
                    <option value="Plus Jakarta Sans">Sans</option>
                    <option value="Lora">Serif</option>
                    <option value="JetBrains Mono">Mono</option>
                </select>
                <div class="t-divider"></div>
                <button class="t-btn" onclick="format('bold')" title="Bold"><b>B</b></button>
                <button class="t-btn" onclick="format('italic')" title="Italic"><i>I</i></button>
                <div class="t-color-box">
                    <input type="color" onchange="format('foreColor', this.value)" class="t-color-input">
                </div>
            </div>

            <div class="t-divider"></div>

            <div class="t-section">
                <button class="t-btn" onclick="format('justifyLeft')">⫷</button>
                <button class="t-btn" onclick="format('justifyCenter')">〓</button>
                <button class="t-btn" onclick="format('insertUnorderedList')">•≡</button>
            </div>

            <div class="t-divider"></div>

            <div class="t-section">
                <button class="t-pill" onclick="insertImage()">🖼 Image</button>
                <button class="t-pill" onclick="insertLink()">🔗 Link</button>
            </div>

            <div class="t-divider"></div>

            <div class="t-section">
                <select id="category-select" class="t-select category-highlight">
                    <option value="MATS">MATS</option>
                    <option value="LCyL">LCyL</option>
                    <option value="ING">ING</option>
                    <option value="FyQ">FyQ</option>
                </select>
            </div>
        </div>

        <div class="canvas-area">
            <input type="text" id="title" class="huge-title" placeholder="Untitled Report" autocomplete="off">
            <div id="content" contenteditable="true" class="pro-writing-area" data-placeholder="Type '/' for commands or start writing..."></div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function format(cmd, val = null) {
            document.execCommand(cmd, false, val);
            document.getElementById('content').focus();
        }

        function insertImage() {
            const url = prompt("Paste Image URL:");
            if (url) format('insertImage', url);
        }

        function insertLink() {
            const url = prompt("Enter URL:");
            if (url) format('createLink', url);
        }

        // Авто-фокус на заголовок при входе
        window.onload = () => document.getElementById('title').focus();
    </script>
</body>
</html>

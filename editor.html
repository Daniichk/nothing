<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Lora:ital,wght@0,400;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <title>Intelligence Studio</title>
</head>
<body class="glass-theme editor-page">
    <div class="glass-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="glass-nav">
        <div class="nav-container">
            <div class="logo" onclick="location.href='index.html'">SCHOOL<span>PRESS</span></div>
            <div class="editor-actions">
                <button onclick="toggleGuide()" class="guide-trigger" title="Commands Guide">?</button>
                <button onclick="location.href='index.html'" class="glass-btn">Exit</button>
                <button onclick="publishArticle()" class="btn-primary">Publish</button>
            </div>
        </div>
    </header>

    <main class="editor-layout">
        <aside id="commands-guide" class="side-guide">
            <h3>Quick Commands</h3>
            <div class="guide-item"><kbd>Ctrl</kbd>+<kbd>B</kbd> <span>Bold</span></div>
            <div class="guide-item"><kbd>Ctrl</kbd>+<kbd>I</kbd> <span>Italic</span></div>
            <div class="guide-item"><kbd>Ctrl</kbd>+<kbd>U</kbd> <span>Underline</span></div>
            <div class="guide-item"><kbd>Ctrl</kbd>+<kbd>Z</kbd> <span>Undo</span></div>
            <hr>
            <p>Use the toolbar above for images, links, and text coloring.</p>
        </aside>

        <div class="floating-toolbar shadow-premium">
            <div class="t-section">
                <select onchange="format('fontName', this.value)" class="t-select">
                    <option value="Plus Jakarta Sans">Sans</option>
                    <option value="Lora">Serif</option>
                    <option value="JetBrains Mono">Mono</option>
                </select>
                <div class="t-divider"></div>
                <button class="t-btn" onclick="format('bold')">B</button>
                <button class="t-btn" onclick="format('italic')">I</button>
                <input type="color" onchange="format('foreColor', this.value)" class="t-color-dot">
            </div>

            <div class="t-divider"></div>

            <div class="t-section">
                <button class="t-pill" onclick="insertImage()">🖼 Image</button>
                <button class="t-pill" onclick="insertLink()">🔗 Link</button>
            </div>

            <div class="t-divider"></div>

            <div class="t-section">
                <select id="category-select" class="t-select category-highlight">
                    <option value="All">All Sectors</option>
                    <option value="MATS">MATS</option>
                    <option value="LCyL">LCyL</option>
                    <option value="ING">ING</option>
                    <option value="FyQ">FyQ</option>
                    <option value="PE">PE</option>
                    <option value="BIO">BIO</option>
                    <option value="VAL">VAL</option>
                </select>
            </div>
        </div>

        <div class="canvas-area">
            <input type="text" id="title" class="huge-title" placeholder="Report Title..." autocomplete="off">
            <div id="content" contenteditable="true" class="pro-writing-area" data-placeholder="Start your intelligence briefing here..."></div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function format(cmd, val = null) {
            document.execCommand(cmd, false, val);
            document.getElementById('content').focus();
        }

        function toggleGuide() {
            const guide = document.getElementById('commands-guide');
            guide.classList.toggle('active');
        }

        function insertImage() {
            const url = prompt("Image URL:");
            if (url) format('insertImage', url);
        }

        function insertLink() {
            const url = prompt("Link URL:");
            if (url) format('createLink', url);
        }

        window.onload = () => document.getElementById('title').focus();
    </script>
</body>
</html>

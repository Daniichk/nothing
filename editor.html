<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Editor | School Press</title>
</head>
<body>
    <header class="glass-nav">
        <div class="logo" onclick="location.href='index.html'">SCHOOL<span>PRESS</span></div>
        <button onclick="location.href='index.html'" class="glass-btn">Exit</button>
    </header>

    <div class="editor-page">
        <div class="editor-container glass-panel">
            <h2>Draft New Article</h2>
            <input type="text" id="title" placeholder="Article Title...">
            <select id="category">
                <option value="MATS">Mathematics</option>
                <option value="INGL">English</option>
                <option value="FyQ">Physics</option>
            </select>
            <div id="content" contenteditable="true" class="rich-editor" data-placeholder="Start writing..."></div>
            <button onclick="publishArticle()" class="publish-btn glass-btn-primary">Publish</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // Блокируем доступ без логина
        if (!localStorage.getItem("userEmail")) location.href = 'index.html';
    </script>
</body>
</html>

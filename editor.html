<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <title>Intelligence Editor | School Press</title>
</head>
<body class="glass-theme editor-page">
    <div class="glass-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="glass-nav">
        <div class="nav-container">
            <div class="logo" onclick="location.href='index.html'">SCHOOL<span>PRESS</span></div>
            <div class="auth-group">
                <button onclick="location.href='index.html'" class="glass-btn">Discard</button>
                <button onclick="publishArticle()" class="glass-btn btn-primary">Publish Report</button>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <div class="editor-toolbar-fixed">
            <div class="tool-group">
                <button onclick="format('bold')"><b>B</b></button>
                <button onclick="format('italic')"><i>I</i></button>
                <button onclick="format('insertUnorderedList')">• List</button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group">
                <button onclick="insertImage()">🖼 Image</button>
                <button onclick="insertLink()">🔗 Link</button>
            </div>
            <div class="tool-separator"></div>
            <select id="category-select" class="editor-select">
                <option value="MATS">MATS</option>
                <option value="LCyL">LCyL</option>
                <option value="ING">ING</option>
                <option value="FyQ">FyQ</option>
                <option value="PE">PE</option>
                <option value="BIO">BIO</option>
            </select>
        </div>

        <div class="editor-paper glass-panel">
            <input type="text" id="title" class="title-input-large" placeholder="Report Title..." spellcheck="false">
            <div id="content" contenteditable="true" class="writing-area" data-placeholder="Write your intelligence report here..."></div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function format(cmd, val = null) {
            document.execCommand(cmd, false, val);
        }

        function insertImage() {
            const url = prompt("Paste Image URL (or use a placeholder link):");
            if (url) {
                format('insertImage', url);
            }
        }

        function insertLink() {
            const url = prompt("Enter link URL:");
            if (url) format('createLink', url);
        }

        // Защита: только залогиненные
        if (!localStorage.getItem("userNick")) {
            location.href = 'index.html';
        }
    </script>
</body>
</html>
